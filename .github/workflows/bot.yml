name: RBX Factory Bot — Keep Alive & Register Commands

on:
  push:
    branches: [main]
  schedule:
    # Runs every 5 minutes to keep alive
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  register-commands:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Register Discord Slash Commands
        run: node scripts/register-commands.js
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          APP_ID: ${{ secrets.APP_ID }}

      - name: Ping Discord API (keep alive)
        run: node scripts/keepalive.js
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          APP_ID: ${{ secrets.APP_ID }}
